apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: lou4y/frontend:4d8d805
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config-volume
          mountPath: /etc/nginx/conf.d
        - name: media-volume
          mountPath: /django/khedma/media/   # Media files mount
      volumes:
      - name: nginx-config-volume
        persistentVolumeClaim:
          claimName: prod-nginx-config-pvc
      - name: media-volume
        persistentVolumeClaim:
          claimName: prod-backend-media-pvc
     
