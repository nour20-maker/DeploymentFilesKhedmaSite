apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: khedma
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: mohamedamine/backend:v11
        ports:
        - containerPort: 8080
