apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: khedma
spec:
  selector:
    app: database
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None  # This is necessary for headless service discovery
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: khedma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
        - name: postgres
          image: postgres:15.3-alpine
          env:
            - name: POSTGRES_DB
              value: "postgres"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: postgres-pvc  # Ensure this PVC is defined
