apiVersion: v1
kind: Pod
metadata:
  name: frontend-app
  namespace: default
  labels:
    type: reactnode
spec:
  containers:
  - name: front-app
    image: mohamedamineblibech/frontend:v1.1  # Corrected image name
  imagePullSecrets:
  - name: dockerhub-secret
  ports:
  - containerPort: 3000
  resources:
    requests:
      memory: "200Mi"
    limits:
      memory: "500Mi"
