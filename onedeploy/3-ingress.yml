apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: example-app
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "nginx"
    service.beta.kubernetes.io/do-loadbalancer-name: "temp1234567.ddns.net"
spec:
  ingressClassName: nginx # Explicitly set the IngressClassName
  tls:
  - hosts:
    - temp1234567.ddns.net
    secretName: example-app-tls
  rules:
  - host: temp1234567.ddns.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: example-service
            port:
              number: 80
