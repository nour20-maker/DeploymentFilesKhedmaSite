apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: khedma-app
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-cluster-issuer"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - khedma12345.ddns.net
    secretName: khedma-app-tls
  rules:
  - host: khedma12345.ddns.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
