apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: lou4y/frontend:2975a0d
        ports:
        - containerPort: 80
        env:
        - name: REACT_APP_API_URL
          value: "http://46.101.124.182:30001"  # Replace with your desired value or use ConfigMap/Secret
        - name: REACT_APP_PUBLIC_FOLDER
          value: "http://46.101.124.182:30000/media/"  # Replace with your desired value or use ConfigMap/Secret
        - name: NODE_ENV
          value: "prod"  # Replace with your desired value or use ConfigMap/Secret
        - name: REACT_APP_IMAGE_URL
          value: "http://46.101.124.182:30000"  # Replace with your desired value or use ConfigMap/Secret
        - name: DJANGO_APP_IMAGE_URL
          value: "http://46.101.124.182:30001"  # Replace with your desired value or use ConfigMap/Secret
        volumeMounts:
        - name: nginx-config-volume
          mountPath: /etc/nginx/conf.d
        - name: media-volume
          mountPath: /django/khedma/media/   # Media files mount
      volumes:
      - name: nginx-config-volume
        persistentVolumeClaim:
          claimName: nginx-config-pvc
      - name: media-volume
        persistentVolumeClaim:
          claimName: backend-media-pvc
