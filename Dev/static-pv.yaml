apiVersion: v1
kind: PersistentVolume
metadata:
  name: backend-static-pv
  namespace: dev
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/data/backend-static
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-static-pvc
  namespace: dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: ""
