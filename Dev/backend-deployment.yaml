apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: lou4y/backend:3fd3e155f
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: media-volume
          mountPath: /django/khedma/media
        - name: static-volume
          mountPath: /django/khedma/build/static
      volumes:
      - name: media-volume
        persistentVolumeClaim:
          claimName: backend-media-pvc
      - name: static-volume
        persistentVolumeClaim:
          claimName: backend-static-pvc
