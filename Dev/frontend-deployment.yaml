apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: lou4y/frontend:ab982720a
        volumeMounts:
        - name: build-volume
          mountPath: /usr/src/app/build
      volumes:
      - name: build-volume
        persistentVolumeClaim:
          claimName: frontend-pvc
