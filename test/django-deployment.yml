apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: your-backend-image  # replace with your backend image
          command: ["gunicorn", "khedma.wsgi", "--bind", "0.0.0.0:8000", "--certfile=/etc/ssl/certs/fullchain.pem", "--keyfile=/etc/ssl/private/privkey.pem"]
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: ssl-certs
              mountPath: /etc/ssl
            - name: media
              mountPath: /django/khedma/media
      volumes:
        - name: ssl-certs
          secret:
            secretName: ssl-cert-secret  # Reference to the secret where Cert-Manager will store the SSL certs
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 443
      targetPort: 8000
  type: LoadBalancer
