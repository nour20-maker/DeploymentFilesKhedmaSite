apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: presprod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: mohamedamineblibech/backend:v1.2  # Replace with your actual backend image
          command: ["gunicorn", "khedma.wsgi", "--bind", "0.0.0.0:8000"]
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: backend-cert-volume
              mountPath: "/etc/ssl/certs/fullchain.pem"  # Mount fullchain.pem from the secret
              subPath: tls.crt
              readOnly: true
            - name: backend-cert-volume
              mountPath: "/etc/ssl/private/privkey.pem"  # Mount privkey.pem from the secret
              subPath: tls.key
              readOnly: true
      volumes:
        - name: backend-cert-volume
          secret:
            secretName: backend-cert-kz46d  # Ensure the correct secret name is used


---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  ports:
    - port: 80
      targetPort: 8000  # Assuming your application listens on 8000 internally
      protocol: TCP
