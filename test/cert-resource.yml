apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: backend-cert
  namespace: presprod  # Ensure this is the same namespace as your application
spec:
  secretName: backend-cert  # The secret where the certificate will be stored
  dnsNames:
    - khedma123456.ddns.net  # Replace with your actual domain name
  issuerRef:
    name: letsencrypt-prod  # The ClusterIssuer you defined
    kind: ClusterIssuer
