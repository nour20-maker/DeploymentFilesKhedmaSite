apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: presprod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:latest
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: POSTGRES_DB
              value: "postgres"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: media-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: media-storage
          persistentVolumeClaim:
            claimName: media-pvc
